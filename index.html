<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderlust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">Wanderlust</a>
    <ul class="nav-links">
      <li><a href="pages/browse.html">Browse</a></li>
      <li><a href="pages/wishlist.html">Wishlist</a></li>
      <li><a href="pages/trips.html">Trips</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </nav>

  <main>
  <section class="hero">
    <div class="hero-decoration" aria-hidden="true"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Your travel journal</p>
      <h1>Dream it.<br />Plan it.<br />Go.</h1>
      <p class="hero-sub">Browse destinations around the world, build your wishlist, and organize your next adventure.</p>
      <a href="pages/browse.html" class="btn-primary">Start Exploring</a>
      <div class="hero-stats" aria-label="Site statistics">
        <div class="hero-stat">
          <span class="hero-stat-num" id="stat-dest">24</span>
          <span class="hero-stat-label">Destinations</span>
        </div>
        <span class="hero-stat-divider" aria-hidden="true"></span>
        <div class="hero-stat">
          <span class="hero-stat-num" id="stat-regions">6</span>
          <span class="hero-stat-label">Regions</span>
        </div>
        <span class="hero-stat-divider" aria-hidden="true"></span>
        <div class="hero-stat" aria-label="Unlimited adventures">
          <span class="hero-stat-num" aria-hidden="true">&#8734;</span>
          <span class="hero-stat-label">Adventures</span>
        </div>
      </div>
    </div>
  </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Wanderlust. Built for adventurers.</p>
  </footer>

  <script src="js/app.js"></script>
  <script type="module">
    import { getAllDestinations, REGIONS } from './js/api.js';
    const destEl    = document.getElementById('stat-dest');
    const regionsEl = document.getElementById('stat-regions');
    if (destEl)    destEl.textContent    = getAllDestinations().length;
    if (regionsEl) regionsEl.textContent = REGIONS.length;
  </script>
</body>
</html>
