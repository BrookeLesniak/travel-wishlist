<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist — Wanderlust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">Wanderlust</a>
    <ul class="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="wishlist.html">Wishlist</a></li>
      <li><a href="trips.html">Trips</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </nav>

  <header class="page-header">
    <h1>My Wishlist</h1>
    <div id="region-filters" class="region-filters"></div>
  </header>

  <main>
    <div id="destination-grid" class="destination-grid">
      <p class="empty-state">Loading...</p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Wanderlust. Built for adventurers.</p>
  </footer>

  <script src="../js/app.js"></script>
  <script type="module">
    import { getWishlist, removeFromWishlist, getWishlistedIds, getNote } from '../js/storage.js';
    import { renderDestinations } from '../js/cards.js';
    import { REGIONS } from '../js/api.js';

    const grid          = document.getElementById('destination-grid');
    const regionFilters = document.getElementById('region-filters');

    let activeRegion = null;

    function buildRegionFilters(wishlist) {
      const presentRegions = REGIONS.filter(r => wishlist.some(d => d.region === r));
      regionFilters.innerHTML = '';

      if (presentRegions.length < 2) return;

      const allBtn = document.createElement('button');
      allBtn.textContent = 'All';
      allBtn.className = `region-btn ${activeRegion === null ? 'active' : ''}`;
      allBtn.addEventListener('click', () => { activeRegion = null; render(); });
      regionFilters.appendChild(allBtn);

      presentRegions.forEach(region => {
        const btn = document.createElement('button');
        btn.textContent = region;
        btn.className = `region-btn ${activeRegion === region ? 'active' : ''}`;
        btn.addEventListener('click', () => { activeRegion = region; render(); });
        regionFilters.appendChild(btn);
      });
    }

    function render() {
      const wishlist = getWishlist();

      if (!wishlist.length) {
        regionFilters.innerHTML = '';
        activeRegion = null;
        grid.innerHTML = '<p class="empty-state">Your wishlist is empty. <a href="browse.html">Start browsing</a> to add destinations.</p>';
        return;
      }

      // If the active region no longer has any items (e.g. last one was removed), reset
      if (activeRegion && !wishlist.some(d => d.region === activeRegion)) {
        activeRegion = null;
      }

      buildRegionFilters(wishlist);

      const filtered = activeRegion
        ? wishlist.filter(d => d.region === activeRegion)
        : wishlist;

      if (!filtered.length) {
        grid.innerHTML = '<p class="empty-state">No destinations from this region in your wishlist.</p>';
        return;
      }

      const savedIds = getWishlistedIds();
      renderDestinations(filtered, grid, {
        isSaved: (id) => savedIds.has(id),
        note: getNote,
        onWishlistToggle: (destination, saved) => {
          if (!saved) {
            removeFromWishlist(destination.id);
            render();
          }
        },
      });
    }

    render();
  </script>
</body>
</html>
