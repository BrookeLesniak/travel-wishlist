<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — Wanderlust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">Wanderlust</a>
    <ul class="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="wishlist.html">Wishlist</a></li>
      <li><a href="trips.html">Trips</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </nav>

  <header class="page-header">
    <h1>Browse Destinations</h1>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by name, country, or tag..." aria-label="Search destinations" />
    </div>
    <div id="region-filters" class="region-filters"></div>
  </header>

  <main>
    <div id="destination-grid" class="destination-grid">
      <p class="empty-state">Loading destinations...</p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Wanderlust. Built for adventurers.</p>
  </footer>

  <script src="../js/app.js"></script>
  <script type="module">
    import { getAllDestinations, searchDestinations, getByRegion, REGIONS } from '../js/api.js';
    import { renderDestinations } from '../js/cards.js';
    import { addToWishlist, removeFromWishlist, getWishlistedIds } from '../js/storage.js';

    const grid          = document.getElementById('destination-grid');
    const searchInput   = document.getElementById('search-input');
    const regionFilters = document.getElementById('region-filters');

    let activeRegion  = null;
    let searchTimeout = null;

    // Build region filter buttons
    const allBtn = document.createElement('button');
    allBtn.textContent = 'All';
    allBtn.className = 'region-btn active';
    allBtn.addEventListener('click', () => selectRegion(null, allBtn));
    regionFilters.appendChild(allBtn);

    REGIONS.forEach(region => {
      const btn = document.createElement('button');
      btn.textContent = region;
      btn.className = 'region-btn';
      btn.addEventListener('click', () => selectRegion(region, btn));
      regionFilters.appendChild(btn);
    });

    function selectRegion(region, btn) {
      activeRegion = region;
      searchInput.value = '';
      regionFilters.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function onWishlistToggle(destination, saved) {
      if (saved) {
        addToWishlist(destination);
      } else {
        removeFromWishlist(destination.id);
      }
    }

    function render() {
      const query = searchInput.value.trim();
      let results;
      if (query) {
        results = searchDestinations(query);
      } else if (activeRegion) {
        results = getByRegion(activeRegion);
      } else {
        results = getAllDestinations();
      }
      const savedIds = getWishlistedIds();
      renderDestinations(results, grid, {
        isSaved: (id) => savedIds.has(id),
        onWishlistToggle,
      });
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      // Clear active region when searching
      activeRegion = null;
      regionFilters.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      allBtn.classList.add('active');
      searchTimeout = setTimeout(render, 300);
    });

    render();
  </script>
</body>
</html>
